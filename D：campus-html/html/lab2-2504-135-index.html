
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网上书店</title>
    <link rel="stylesheet" href="css/lab2-2504-133-index.css">
</head>
<body>
    <header class="header">
        <div class="logo">BOOK STORE</div>
        <nav class="nav-menu">
            <a href="#">首页</a>
            <a href="#">分类</a>
            <a href="#">购物车</a>
            <a href="#">登录</a>
        </nav>
    </header>

    <div class="main-container">
        <aside class="sidebar-left">
            <h3>图书分类</h3>
            <ul>
                <li>文学小说</li>
                <li>计算机科学</li>
                <li>艺术设计</li>
                <li>人文社科</li>
                <li>少儿读物</li>
            </ul>
        </aside>

        <section class="content-middle">
            <div class="book-showcase">
                <h3>精选图书</h3>
                <div class="book-grid">
                    <div class="book-card hover-effect">
                        <img src="image/book1.jpg" alt="书名">
                        <p>《Web开发实战》</p>
                    </div>
                    <div class="book-card hover-effect">
                        <img src="image/book2.jpg" alt="书名">
                        <p>《设计心理学》</p>
                    </div>
                    <div class="book-card hover-effect">
                        <img src="image/book3.jpg" alt="书名">
                        <p>《现代历史》</p>
                    </div>
                </div>
            </div>

            <div class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="rec-item">《网页设计基础与实战》</div>
                <div class="rec-item">《C++语言程序设计》</div>
                <div class="hot-tag">HOT!</div>
            </div>

            <div class="new-arrivals">
                <h3>新书上市</h3>
                <table>
                    <thead>
                        <tr>
                            <th>书名</th>
                            <th>作者</th>
                            <th>价格</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>深入理解计算机系统</td>
                            <td>Randal E. Bryant</td>
                            <td>¥128.00</td>
                        </tr>
                        <tr>
                            <td>JavaScript高级程序设计</td>
                            <td>Nicholas C. Zakas</td>
                            <td>¥89.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <aside class="sidebar-right">
            <div class="promo-box">
                <h4>限时促销</h4>
                <p>全场图书满 200 减 100！</p>
                <button>立即抢购</button>
            </div>
        </aside>
    </div>
</body>
</html>
